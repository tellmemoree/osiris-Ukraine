name: CodeQL

# Static security analysis for JS/TS. OSIRIS is an OSINT/security tool with
# user-supplied IP/host inputs and SSRF guards (see ARCHITECTURE.md → API route
# conventions / SECURITY.md), so static scanning earns its keep here.

on:
  push:
    branches: [master, osiris-Ukraine-merged]
  pull_request:
    branches: [master, osiris-Ukraine-merged]
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly-disclosed query updates.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
