name: CI

# Lint (advisory) + type-check + production build.
# Type-check & build are blocking; lint is advisory because the inherited
# `no-explicit-any` debt is WON'T FIX (see ARCHITECTURE.md / HANDOFF.md #3).

on:
  push:
    branches: [master, osiris-Ukraine, osiris-Ukraine-merged]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: type-check · lint · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
